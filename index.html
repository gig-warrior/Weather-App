<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="/Weather App/weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <div class="container">
        <div class="search-container">
            <div class="searchbar-autocomplete">
                <input type="text" id="search_location" value="" placeholder="search a city">
                <div id="autocomplete"></div>
            </div>

            <button id="search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        
        <div class="data">
            <h2>Search city...</h2>
        </div>
    </div>
    <p id="rightes">Data provided by Weatherapi.com</p>
    <p id="rightes">*All rightes reserved by LendiChor6969.</p>
    
    <script src="/Weather App/weather.js"></script>
</body>
</html>
